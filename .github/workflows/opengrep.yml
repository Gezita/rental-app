name: Opengrep SAST

on: push

permissions:
  contents: read
  security-events: write

jobs:
  opengrep:
    name: Run Opengrep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Opengrep
        run: |
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
          echo "$HOME/.opengrep/bin" >> "$GITHUB_PATH"

      - name: Confirm Opengrep is installed
        run: |
          which opengrep
          opengrep --version

      - name: Run Opengrep scan
        run: |
          opengrep scan \
            --config auto \
            --sarif-output "${{ github.workspace }}/opengrep.sarif" \
            "${{ github.workspace }}"

      - name: Confirm SARIF file exists
        run: |
          ls -lah "${{ github.workspace }}"
          test -f "${{ github.workspace }}/opengrep.sarif"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ github.workspace }}/opengrep.sarif
